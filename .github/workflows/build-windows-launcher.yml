# Ручная сборка Windows-бинарника плеер-лаунчера (MSVC) с зашитым URL бэкенда.
# Запуск: вкладка Actions → Build Windows Launcher → Run workflow,
# либо: gh workflow run build-windows-launcher.yml -f api_url=https://launcher.likonchik.xyz
# Готовый exe — в артефактах рана; его заливаем в дашборд на странице «Релизы».
name: Build Windows Launcher

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Публичный URL бэкенда (зашивается в бинарник)'
        required: true
        default: 'https://launcher.likonchik.xyz'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher-slint
      - name: Build release
        working-directory: launcher-slint
        env:
          LAUNCHER_DEFAULT_API_URL: ${{ inputs.api_url }}
        run: cargo build --release --locked
      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(awk -F '"' '/^version = / { print $2; exit }' launcher-slint/Cargo.toml)" >> "$GITHUB_OUTPUT"
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp launcher-slint/target/release/launcher-slint.exe dist/ProjectMinecraftLauncher.exe
      - uses: actions/upload-artifact@v4
        with:
          name: project-minecraft-launcher-${{ steps.version.outputs.version }}-windows-x64
          path: dist/ProjectMinecraftLauncher.exe
          if-no-files-found: error
