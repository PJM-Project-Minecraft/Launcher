# Ручная сборка нативного античита под Windows (anticheat.dll) через MSVC + CMake.
# Запуск: вкладка Actions → Build Windows Anticheat DLL → Run workflow,
# либо: gh workflow run build-windows-anticheat.yml
# Готовый anticheat.dll — в артефактах рана; его кладём на прод в backend/data/
# (scp), бэкенд раздаёт его лаунчерам, SHA сверяется по манифесту.
name: Build Windows Anticheat DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # JDK даёт jvmti.h/jni.h и include/win32/jni_md.h — CMakeLists берёт их из JAVA_HOME.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Configure
        run: cmake -B anticheat-native/build -S anticheat-native
      - name: Build (Release)
        run: cmake --build anticheat-native/build --config Release
      - name: Collect dll
        shell: bash
        run: |
          mkdir -p dist
          # MSVC кладёт результат в build/Release/anticheat.dll — копируем стабильным путём.
          find anticheat-native/build -name 'anticheat.dll' -print -exec cp {} dist/ \;
          test -f dist/anticheat.dll
      - uses: actions/upload-artifact@v4
        with:
          name: anticheat-dll-windows-x64
          path: dist/anticheat.dll
          if-no-files-found: error
