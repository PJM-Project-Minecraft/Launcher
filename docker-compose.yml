services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: launcher
      POSTGRES_USER: launcher
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-launcher_dev_password}"
    ports:
      # dev: открыт на 5432 (нужно dev.sh). prod задаёт POSTGRES_BIND=127.0.0.1:5432 в .env
      - "${POSTGRES_BIND:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Схема БД создаётся приложением через GORM AutoMigrate при старте server/bot.
      # Старые raw-SQL миграции больше не накатываются, чтобы не конфликтовать с моделями.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launcher -d launcher"]
      interval: 5s
      timeout: 3s
      retries: 12

  # API-сервер (Fiber). Схема БД создаётся GORM AutoMigrate при старте.
  server:
    build: ./backend
    command: ["/app/server"]
    restart: unless-stopped
    environment:
      SERVER_ADDR: "0.0.0.0:8080"
      DATABASE_URL: "postgres://launcher:${POSTGRES_PASSWORD:-launcher_dev_password}@postgres:5432/launcher?sslmode=disable"
      AUTH_MODE: "${AUTH_MODE:-local}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      # prod (.env на VPS): обязателен и != JWT_SECRET (P6). Пусто в dev → деривируется из JWT.
      ANTICHEAT_SECRET: "${ANTICHEAT_SECRET:-}"
      # Без passthrough .env-значения ДО контейнера не доходят (гоча ANTICHEAT_SECRET).
      ANTICHEAT_AUTO_BAN: "${ANTICHEAT_AUTO_BAN:-false}"
      ANTICHEAT_REQUIRE_ATTESTATION: "${ANTICHEAT_REQUIRE_ATTESTATION:-false}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}"
      # База публичного бакета с файлами сборок. Пусто (dev) → файлы качаются с бэкенда.
      # Включать только когда mandatory-версия лаунчера >= 0.4.1: до неё лаунчер слал
      # bearer на любой хост, а S3 отвечает 400 на чужой Authorization.
      PROFILE_CDN_BASE: "${PROFILE_CDN_BASE:-}"
      # prod (.env на VPS): APP_ENV=production — сервер откажется стартовать с дев-секретами.
      APP_ENV: "${APP_ENV:-development}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    ports:
      # dev: 0.0.0.0:8080. prod задаёт SERVER_BIND=127.0.0.1:8082 в .env (за nginx)
      - "${SERVER_BIND:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s

  # Telegram-бот. Делит ту же БД, что и server.
  bot:
    build: ./backend
    command: ["/app/bot"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://launcher:${POSTGRES_PASSWORD:-launcher_dev_password}@postgres:5432/launcher?sslmode=disable"
      AUTH_MODE: "${AUTH_MODE:-local}"
      APP_ENV: "${APP_ENV:-development}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      # prod: обязателен и != JWT_SECRET (P6). bot тоже зовёт config.Validate() при старте.
      ANTICHEAT_SECRET: "${ANTICHEAT_SECRET:-}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      ADMIN_TELEGRAM_IDS: "${ADMIN_TELEGRAM_IDS:-}"
      TOTP_ISSUER: "${TOTP_ISSUER:-Launcher Accounts}"
      # Брендинг шапки inline-меню (иначе дефолтный «Launcher Accounts»).
      BOT_PUBLIC_NAME: "${BOT_PUBLIC_NAME:-}"
      BOT_BRAND_LINE: "${BOT_BRAND_LINE:-}"
      DONATE_SHOP_URL: "${DONATE_SHOP_URL:-https://shop.likonchik.xyz}"
      LAUNCHER_EXE_PATH: "${LAUNCHER_EXE_PATH:-}"
      # Баннер inline-меню (link-preview). Пусто — меню без картинки.
      BOT_BANNER_URL: "${BOT_BANNER_URL:-}"
      # Страница /privacy для кнопки «Читать полностью» в гейте политики.
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
